<!DOCTYPE html>
<html>
<head>
  <title>Vote Now</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; padding:20px; font-family: sans-serif; background: #eee; text-align: center; }
    h1 { color: #1E3668; margin-bottom: 30px; }
    
    .btn {
      display: block; width: 100%; padding: 20px; margin: 15px 0;
      font-size: 1.5rem; font-weight: bold; border: none; border-radius: 10px; color: white;
      cursor: pointer; transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    .btn-left { background: #1E3668; }
    .btn-right { background: #F09222; }

    .status { margin-top: 20px; color: #666; font-size: 1.1rem; font-weight: bold; }
    
    /* UI states based on URL validation */
    #errorMsg { color: #d9534f; font-weight: bold; font-size: 1.2rem; margin-top: 40px; display: none; }
    #voting-container { display: none; } 
  </style>
</head>
<body>

  <h1>Cast Your Vote</h1>

  <div id="errorMsg">⚠️ Invalid Event Link.<br><br>Please scan the QR code on the main screen again.</div>

  <div id="voting-container">
    <button class="btn btn-left" id="btnLeft" onclick="castVote('left')">Vote Option 1</button>
    <button class="btn btn-right" id="btnRight" onclick="castVote('right')">Vote Option 2</button>
    <div class="status" id="statusMsg">Tap a button to vote!</div>
  </div>

  <script type="module">
    // IMPORTANT: Make sure this imports correctly from your firebase-config.js
    import { db, ref, update, increment, onValue } from './firebase-config.js';

    // 1. Extract Event ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event');
    
    let eventRef = null;

    // 2. Validate URL and display correct UI
    if (!eventId) {
      document.getElementById('errorMsg').style.display = 'block';
    } else {
      document.getElementById('voting-container').style.display = 'block';
      eventRef = ref(db, 'votes/' + eventId);

      // 3. Listen for Custom Labels from the Admin Panel
      onValue(eventRef, (snapshot) => {
        const data = snapshot.val() || {};
        if (data.config) {
          document.getElementById('btnLeft').textContent = data.config.labelLeft || 'Vote Option 1';
          document.getElementById('btnRight').textContent = data.config.labelRight || 'Vote Option 2';
        }
      });
    }

    // 4. Cast Vote Logic
    window.castVote = function(side) {
      if (!eventRef) return; // Hard failsafe against broken links

      const btnL = document.getElementById('btnLeft');
      const btnR = document.getElementById('btnRight');
      const msg = document.getElementById('statusMsg');

      // Send +1 to the cloud (using atomic increment to prevent glitches)
      const updates = {};
      updates[side] = increment(1);
      
      update(eventRef, updates).then(() => {
         msg.textContent = "Vote Sent!";
      }).catch((error) => {
         msg.textContent = "Error connecting to server.";
         console.error(error);
      });
      
      // Cooldown (prevent spam)
      btnL.disabled = true;
      btnR.disabled = true;
      
      setTimeout(() => {
        btnL.disabled = false;
        btnR.disabled = false;
        msg.textContent = "Vote again?";
      }, 2000);
    }
  </script>
</body>
</html>
