<!DOCTYPE html>
<html>
<head>
  <title>DAVE-CO - ADMIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    :root { --term-color: #8b55d6; --term-glow: rgba(139, 85, 214, 0.5); --term-bg: #000; --system-ok: #00ff41; }
    body { background-color: var(--term-bg); color: var(--term-color); font-family: 'VT323', monospace; margin: 0; padding: 20px; height: 100vh; overflow-y: auto; text-transform: uppercase; }
    body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; pointer-events: none; }
    
    h1 { border-bottom: 2px solid var(--term-color); padding-bottom: 10px; text-shadow: 0 0 10px var(--term-color); font-size: 2.5rem; margin-top: 0; }
    .panel-box { border: 2px solid var(--term-color); padding: 15px; margin-bottom: 20px; box-shadow: 0 0 15px var(--term-glow); background: rgba(20, 10, 30, 0.8); position: relative; z-index: 10;}
    h2 { margin-top: 0; font-size: 1.5rem; text-shadow: 0 0 5px var(--term-color); }
    
    .status-panel { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; color: var(--system-ok); font-size: 1.2rem; text-shadow: 0 0 5px var(--system-ok); }
    .tier-badge { font-weight: bold; padding: 2px 8px; border: 1px solid; border-radius: 4px; font-size: 1rem; }
    .tier-free { color: #ff3333; border-color: #ff3333; box-shadow: 0 0 5px rgba(255,51,51,0.5); }
    .tier-pro { color: var(--system-ok); border-color: var(--system-ok); box-shadow: 0 0 5px rgba(0,255,65,0.5); }
    .heartbeat { width: 12px; height: 12px; border-radius: 50%; background: var(--system-ok); box-shadow: 0 0 10px var(--system-ok); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

    label { display: block; font-size: 1.5rem; margin-bottom: 10px; }
    input[type=range] { width: 100%; accent-color: var(--term-color); height: 20px; background: #111; border: 1px solid var(--term-color); }
    input[type=number], select, input[type=text], input[type=color] { background: #000; color: var(--term-color); border: 2px solid var(--term-color); font-family: 'VT323', monospace; font-size: 1.5rem; padding: 5px; width: 100%; text-align: center; margin-bottom: 10px; outline: none; box-shadow: 0 0 5px var(--term-glow); box-sizing: border-box; }
    input[type=number] { width: 80px; }
    input[type=color] { height: 50px; cursor: pointer; padding: 2px; }
    
    .value-readout { float: right; }
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    
    button { background: #000; color: var(--term-color); border: 2px solid var(--term-color); font-family: 'VT323', monospace; font-size: 1.5rem; padding: 10px 20px; cursor: pointer; flex: 1; transition: 0.2s; text-transform: uppercase; text-shadow: 0 0 5px var(--term-color); box-shadow: 0 0 5px var(--term-glow); }
    button:hover { background: var(--term-color); color: #000; box-shadow: 0 0 15px var(--term-color); text-shadow: none; }
    button:active { transform: translateY(2px); }
    
    .danger-zone { border-color: #ff3333; color: #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.3); }
    .danger-zone h2 { color: #ff3333; border-bottom-color: #ff3333; text-shadow: 0 0 5px #ff3333; }
    .btn-danger { border-color: #ff3333; color: #ff3333; text-shadow: 0 0 5px #ff3333; box-shadow: 0 0 5px rgba(255, 51, 51, 0.3); }
    .btn-danger:hover { background: #ff3333; color: #000; box-shadow: 0 0 15px #ff3333; text-shadow: none; }
    
    .btn-fireworks { background: var(--term-color); color: #000; text-shadow: none; box-shadow: 0 0 15px var(--term-color); font-weight: bold; font-size: 1.8rem; }
    .btn-fireworks:hover { background: #fff; color: #000; box-shadow: 0 0 25px #fff; border-color: #fff; }
    .btn-link { border-color: #80a2df; color: #80a2df; text-shadow: 0 0 5px #80a2df; box-shadow: 0 0 5px rgba(128, 162, 223, 0.3); }
    .btn-link:hover { background: #80a2df; color: #000; box-shadow: 0 0 15px #80a2df; text-shadow: none; }
    
    .input-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    #main-controls { display: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
    #main-controls.active { display: block; opacity: 1; }
  </style>
</head>
<body>

  <h1>DAVE-CO <br> CONTROL CENTER</h1>

  <div class="panel-box" id="connection-panel">
    <h2>> ESTABLISH SECURE LINK</h2>
    <div class="input-row">
      <input type="text" id="eventIdInput" placeholder="ENTER EVENT UUID..." style="margin-bottom: 0; text-align: left; padding-left: 15px;">
      <button onclick="manualConnect()" style="flex: 0 0 auto;">CONNECT</button>
    </div>
  </div>

  <div id="main-controls">
    <div class="panel-box">
      <div class="status-panel">
        <div class="heartbeat"></div>
        <span>SESSION: [<span id="event-display-id" style="color:#fff;">--</span>] // PING: <span id="ping-ms">--</span>ms</span>
        <span id="tier-badge" class="tier-badge"></span>
      </div>
    </div>

    <!-- NEW LINK GENERATOR PANEL -->
    <div class="panel-box">
      <h2>> EVENT LINKS</h2>
      <div class="btn-group">
        <button class="btn-link" onclick="copyLink('view')">COPY DISPLAY LINK</button>
        <button class="btn-link" onclick="copyLink('voting')">COPY VOTING LINK</button>
      </div>
    </div>

    <div class="panel-box">
      <h2>> SPECIAL EVENT FX</h2>
      <button class="btn-fireworks" onclick="launchFireworks()">LAUNCH FIREWORKS</button>
    </div>

    <div class="panel-box">
      <h2>> CUSTOM VOTING LABELS</h2>
      <div class="input-row">
        <label style="font-size: 1.2rem; flex: 1;">LEFT BUTTON:</label>
        <input type="text" id="in_labelLeft" placeholder="e.g. Option 1" style="flex: 2; margin-bottom: 0;" oninput="updateConfig()">
      </div>
      <div class="input-row" style="margin-top: 15px;">
        <label style="font-size: 1.2rem; flex: 1;">RIGHT BUTTON:</label>
        <input type="text" id="in_labelRight" placeholder="e.g. Option 2" style="flex: 2; margin-bottom: 0;" oninput="updateConfig()">
      </div>
    </div>

    <div class="panel-box">
      <h2>> MANUAL SCORE OVERRIDE</h2>
      <div class="input-row">
        <label>LEFT SIDE:</label>
        <input type="number" id="manualLeft" placeholder="0">
        <button onclick="setScore('left')">SET</button>
      </div>
      <div class="input-row">
        <label>RIGHT SIDE:</label>
        <input type="number" id="manualRight" placeholder="0">
        <button onclick="setScore('right')">SET</button>
      </div>
    </div>

    <div class="panel-box">
      <h2>> QUICK ADJUST (+/-)</h2>
      <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size: 1.8rem;">
        <span>L-SIDE: <strong id="scoreL">0</strong></span>
        <span>R-SIDE: <strong id="scoreR">0</strong></span>
      </div>
      <div class="btn-group">
        <button onclick="mod('left', -1)">L -1</button>
        <button onclick="mod('left', 1)">L +1</button>
        <button onclick="mod('right', -1)">R -1</button>
        <button onclick="mod('right', 1)">R +1</button>
      </div>
    </div>

    <div class="panel-box">
      <h2>> VISUAL REFERENCES</h2>
      <div class="input-row">
        <div style="flex:1; padding-right:10px;">
          <label>LEFT BRAND COLOR:</label>
          <input type="color" id="in_colorLeft" value="#635496" oninput="updateConfig()">
        </div>
        <div style="flex:1;">
          <label>RIGHT BRAND COLOR:</label>
          <input type="color" id="in_colorRight" value="#F09222" oninput="updateConfig()">
        </div>
      </div>

      <div class="input-row" style="margin-top: 20px;">
        <div style="flex:1; padding-right:10px;">
          <label>LEFT DISH ICON:</label>
          <select id="sel_iconLeft" onchange="updateConfig()">
            <option value="none">None</option>
            <option value="brick">Brick</option>
            <option value="house">Small House</option>
            <option value="hardhat">Hard Hat</option>
            <option value="clipboard">Clipboard</option>
            <option value="crane">Crane</option>
          </select>
        </div>
        <div style="flex:1;">
          <label>RIGHT DISH ICON:</label>
          <select id="sel_iconRight" onchange="updateConfig()">
            <option value="none">None</option>
            <option value="brick">Brick</option>
            <option value="house">Small House</option>
            <option value="hardhat">Hard Hat</option>
            <option value="clipboard">Clipboard</option>
            <option value="crane">Crane</option>
          </select>
        </div>
      </div>
      
      <div style="margin-top: 20px;">
        <label>WATERMARK OPACITY <span id="disp_opacity" class="value-readout">15%</span></label>
        <input type="range" min="0" max="100" id="in_opacity" oninput="updateConfig()">
      </div>
      <div style="margin-top: 20px;">
        <label>GLOBAL SCALE ZOOM <span id="disp_zoom" class="value-readout">100%</span></label>
        <input type="range" min="50" max="200" step="5" id="in_zoom" oninput="updateConfig()">
      </div>
    </div>

    <div class="panel-box">
      <h2>> PHYSICS PARAMETERS</h2>
      <div style="margin-bottom: 20px;">
        <label>SENSITIVITY <span id="disp_sens" class="value-readout">5</span></label>
        <input type="range" min="1" max="20" id="in_sens" oninput="updateConfig()">
      </div>
      <div>
        <label>MAX TILT ANGLE <span id="disp_tilt" class="value-readout">25</span></label>
        <input type="range" min="5" max="45" id="in_tilt" oninput="updateConfig()">
      </div>
    </div>

    <div class="panel-box danger-zone">
      <h2>> DANGER ZONE</h2>
      <button class="btn-danger" onclick="nukeIt()">INITIATE RESET PROTOCOL</button>
    </div>
  </div>

  <script type="module">
    import { db, ref, update, set, increment, onValue } from './firebase-config.js';

    let currentEventId = null;
    let eventRef = null;
    let lastActive = Date.now();

    const urlParams = new URLSearchParams(window.location.search);
    const urlEvent = urlParams.get('event');
    const tier = urlParams.get('tier') || 'free';
    
    // Set UI Tier Badge
    const badge = document.getElementById('tier-badge');
    if(tier === 'pro') {
        badge.textContent = "PRO TIER";
        badge.className = "tier-badge tier-pro";
    } else {
        badge.textContent = "FREE TIER";
        badge.className = "tier-badge tier-free";
    }

    if (urlEvent) { connectToEvent(urlEvent); }

    window.manualConnect = function() {
      const inputId = document.getElementById('eventIdInput').value.trim();
      if (inputId) {
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?event=' + inputId + '&tier=' + tier;
        window.history.pushState({path:newUrl}, '', newUrl);
        connectToEvent(inputId);
      }
    };

    window.copyLink = function(type) {
      const targetFile = type === 'view' ? 'view.html' : 'voting.html';
      const url = new URL(targetFile, window.location.href);
      url.searchParams.set('event', currentEventId);
      url.searchParams.set('tier', tier); // Pass the tier so view.html knows if it should show the watermark
      
      navigator.clipboard.writeText(url.href).then(() => {
          alert(`Copied ${type.toUpperCase()} link straight to clipboard!\n\nLink: ${url.href}`);
      }).catch(err => {
          console.error('Could not copy string: ', err);
      });
    };

    function connectToEvent(id) {
      currentEventId = id;
      eventRef = ref(db, 'votes/' + currentEventId); 
      
      document.getElementById('connection-panel').style.display = 'none';
      document.getElementById('event-display-id').innerText = currentEventId;
      document.getElementById('main-controls').classList.add('active');

      onValue(eventRef, (snapshot) => {
        const now = Date.now();
        document.getElementById('ping-ms').innerText = now - lastActive > 2000 ? '20' : now - lastActive;
        lastActive = now;

        const data = snapshot.val() || {};
        const config = data.config || { sensitivity: 5, maxTilt: 25, iconOpacity: 15, scaleZoom: 100 };

        document.getElementById('in_sens').value = config.sensitivity || 5;
        document.getElementById('disp_sens').innerText = config.sensitivity || 5;
        document.getElementById('in_tilt').value = config.maxTilt || 25;
        document.getElementById('disp_tilt').innerText = config.maxTilt || 25;
        
        document.getElementById('in_opacity').value = config.iconOpacity ?? 15;
        document.getElementById('disp_opacity').innerText = (config.iconOpacity ?? 15) + '%';
        document.getElementById('in_zoom').value = config.scaleZoom ?? 100;
        document.getElementById('disp_zoom').innerText = (config.scaleZoom ?? 100) + '%';
        
        document.getElementById('sel_iconLeft').value = config.iconLeft || 'none';
        document.getElementById('sel_iconRight').value = config.iconRight || 'none';

        if (document.activeElement !== document.getElementById('in_colorLeft')) {
            document.getElementById('in_colorLeft').value = config.colorLeft || '#635496';
        }
        if (document.activeElement !== document.getElementById('in_colorRight')) {
            document.getElementById('in_colorRight').value = config.colorRight || '#F09222';
        }

        if (document.activeElement !== document.getElementById('in_labelLeft')) {
            document.getElementById('in_labelLeft').value = config.labelLeft || '';
        }
        if (document.activeElement !== document.getElementById('in_labelRight')) {
            document.getElementById('in_labelRight').value = config.labelRight || '';
        }

        document.getElementById('scoreL').innerText = data.left || 0;
        document.getElementById('scoreR').innerText = data.right || 0;
      });
    }

    window.updateConfig = function() {
      if(!eventRef) return;
      update(eventRef, {
        "config/sensitivity": parseInt(document.getElementById('in_sens').value),
        "config/maxTilt": parseInt(document.getElementById('in_tilt').value),
        "config/iconLeft": document.getElementById('sel_iconLeft').value,
        "config/iconRight": document.getElementById('sel_iconRight').value,
        "config/iconOpacity": parseInt(document.getElementById('in_opacity').value),
        "config/scaleZoom": parseInt(document.getElementById('in_zoom').value),
        "config/labelLeft": document.getElementById('in_labelLeft').value,
        "config/labelRight": document.getElementById('in_labelRight').value,
        "config/colorLeft": document.getElementById('in_colorLeft').value,
        "config/colorRight": document.getElementById('in_colorRight').value
      });
    }

    window.setScore = function(side) {
      if(!eventRef) return;
      const val = parseInt(document.getElementById(side === 'left' ? 'manualLeft' : 'manualRight').value);
      if (!isNaN(val)) { const updates = {}; updates[side] = val; update(eventRef, updates); }
    }

    window.mod = function(side, val) {
      if(!eventRef) return;
      const updates = {}; updates[side] = increment(val); update(eventRef, updates);
    }

    window.launchFireworks = function() { if(!eventRef) return; update(eventRef, { "config/fireworks": Date.now() }); }

    window.nukeIt = function() {
      if(!eventRef) return;
      if(confirm("CONFIRM SYSTEM WIPE? THIS WILL RESET SCORES TO ZERO FOR EVENT: " + currentEventId)) {
        update(eventRef, { left: 0, right: 0 });
      }
    }
  </script>
</body>
</html>
